:root {
  --ifm-color-primary: #2563eb;
  --ifm-color-primary-dark: #1d4ed8;
  --ifm-color-primary-darker: #1e40af;
  --ifm-color-primary-darkest: #1e3a8a;
  --ifm-color-primary-light: #3b82f6;
  --ifm-color-primary-lighter: #60a5fa;
  --ifm-color-primary-lightest: #93c5fd;

  --ifm-code-font-size: 95%;
  --docusaurus-highlighted-code-line-bg: rgba(37, 99, 235, 0.12);

  --ifm-background-color: #f8fafc;
  --ifm-navbar-background-color: #ffffff;
  --ifm-footer-background-color: #f1f5f9;
}

[data-theme='dark'] {
  --ifm-background-color: #070b14;
  --ifm-background-surface-color: #0d111c;
  --ifm-navbar-background-color: #090d16;
  --ifm-footer-background-color: #090d16;

  --ifm-font-color-base: #e5e7eb;
  --ifm-heading-color: #ffffff;

  --ifm-color-primary: #3b82f6;
  --ifm-color-primary-dark: #2563eb;
  --ifm-color-primary-darker: #1d4ed8;
  --ifm-color-primary-darkest: #1e40af;
  --ifm-color-primary-light: #60a5fa;
  --ifm-color-primary-lighter: #93c5fd;
  --ifm-color-primary-lightest: #bfdbfe;

  --docusaurus-highlighted-code-line-bg: rgba(59, 130, 246, 0.18);
}

.navbar {
  backdrop-filter: blur(14px);
  background: rgba(9, 13, 22, 0.85) !important;
  border-bottom: 1px solid rgba(59, 130, 246, 0.15);
}

.footer {
  border-top: 1px solid rgba(59, 130, 246, 0.15);
}

.button--primary {
  border-radius: 12px;
}

.card {
  border-radius: 16px;
  border: 1px solid rgba(59, 130, 246, 0.15);
  background: rgba(15, 23, 42, 0.6);
}

:root {
  --olb-mono: 'IBM Plex Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
